<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <!-- Church roof / triangle -->
  <polygon points="256,80 400,220 112,220" fill="#f59e0b"/>
  <!-- Church tower -->
  <rect x="230" y="180" width="52" height="32" fill="#f59e0b"/>
  <!-- Cross on top -->
  <rect x="248" y="52" width="16" height="48" fill="#ffffff"/>
  <rect x="232" y="70" width="48" height="14" fill="#ffffff"/>
  <!-- Church body -->
  <rect x="130" y="220" width="252" height="170" rx="4" fill="#f59e0b"/>
  <!-- Door -->
  <rect x="220" y="300" width="72" height="90" rx="36" fill="#1a1a2e"/>
  <!-- Windows -->
  <rect x="150" y="248" width="44" height="52" rx="22" fill="#1a1a2e"/>
  <rect x="318" y="248" width="44" height="52" rx="22" fill="#1a1a2e"/>
  <!-- ICIMS text -->
  <text x="256" y="450" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4">ICIMS</text>
</svg>
